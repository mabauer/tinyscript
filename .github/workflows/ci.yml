name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Cache Node.js runtime (frontend-maven-plugin)
        uses: actions/cache@v4
        with:
          path: de.mkbauer.tinyscript.webdemo/frontend/node
          key: node-${{ runner.os }}-v22.14.0

      - name: Build and test core (Tycho reactor)
        run: mvn clean install

      - name: Build REPL
        run: mvn clean package -f de.mkbauer.tinyscript.repl/pom.xml

      - name: Build and test web demo
        run: mvn clean package -f de.mkbauer.tinyscript.webdemo/pom.xml
