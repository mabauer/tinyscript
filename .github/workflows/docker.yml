name: Docker

on:
  push:
    tags: ['v*.*.*']

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Cache Node.js runtime (frontend-maven-plugin)
        uses: actions/cache@v4
        with:
          path: de.mkbauer.tinyscript.webdemo/frontend/node
          key: node-${{ runner.os }}-v22.14.0

      - name: Build core (Tycho reactor, skip tests)
        run: mvn clean install -DskipTests

      - name: Build web demo JAR (skip Java tests, Vitest still runs)
        run: mvn clean package -f de.mkbauer.tinyscript.webdemo/pom.xml -DskipTests

      - name: Extract version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: de.mkbauer.tinyscript.webdemo
          push: true
          tags: |
            mkbauer/tinyscript:${{ env.VERSION }}
            mkbauer/tinyscript:latest
